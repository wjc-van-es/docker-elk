info:
  name: By_name
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}:9200/movies/_search"
  body:
    type: json
    data: |-
      {
        "query": {
          "match": { "Title": "The Lord"}
        },
        "size": 25
      }
  auth:
    type: basic
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
