info:
  name: By_range
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}:9200/movies/_search"
  body:
    type: json
    data: |-
      {
        "query": {
          "range": {
            "Year": {
              "gte": 2010
            }
          }
        },
        "size": 25
      }
  auth:
    type: basic
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
